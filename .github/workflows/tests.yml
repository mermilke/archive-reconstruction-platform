name: tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: py${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # Zero runtime dependencies: nothing to install. Install the package
      # itself so the `arc` console script is exercised too.
      - name: Install package
        run: python -m pip install -e .

      - name: Verify the CLI entry point
        run: arc --version

      - name: Byte-compile check (syntax across all modules)
        run: python -m compileall -q src tests scripts

      - name: Run the test suite
        run: python tests/run_all.py

  lint:
    name: lint + type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Lint/type tooling lives in the optional [dev] extra; the runtime core
      # still installs with zero dependencies.
      - name: Install dev tooling
        run: python -m pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check

      - name: Type-check (mypy)
        run: mypy
